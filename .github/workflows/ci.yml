name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci --no-audit --no-fund
      - name: Typecheck all workspaces
        run: npm run lint --if-present

  unit-tests:
    name: Unit tests (no Postgres)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci --no-audit --no-fund
      - name: Run vitest (DATABASE_URL unset → integration tests skip)
        run: npm test --if-present

  integration-tests:
    name: Integration tests (Postgres)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: medihive
          POSTGRES_PASSWORD: medihive_ci
          POSTGRES_DB: medihive
        ports:
          - 5432:5432
        # Wait for Postgres to be ready before the job starts.
        options: >-
          --health-cmd "pg_isready -U medihive -d medihive"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    env:
      DATABASE_URL: postgres://medihive:medihive_ci@127.0.0.1:5432/medihive
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci --no-audit --no-fund
      - name: Apply migrations
        run: npm run migrate --workspace=@medi-hive/local-vault
      - name: Run vitest with DATABASE_URL set
        run: npm test --workspace=@medi-hive/local-vault

  license-check:
    name: License header sanity
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify LICENSE is AGPL-3.0
        run: |
          if ! head -3 LICENSE | grep -q "GNU AFFERO GENERAL PUBLIC LICENSE"; then
            echo "::error::LICENSE file does not appear to be AGPL-3.0"
            exit 1
          fi
      - name: Verify package.json declares AGPL-3.0
        run: |
          if ! grep -q '"license": "AGPL-3.0' package.json; then
            echo "::error::package.json does not declare AGPL-3.0 license"
            exit 1
          fi

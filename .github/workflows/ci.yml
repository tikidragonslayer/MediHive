name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci --no-audit --no-fund
      - name: Typecheck all workspaces
        run: npm run lint --if-present

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci --no-audit --no-fund
      - name: Run vitest
        run: npm test --if-present

  license-check:
    name: License header sanity
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify LICENSE is AGPL-3.0
        run: |
          if ! head -3 LICENSE | grep -q "GNU AFFERO GENERAL PUBLIC LICENSE"; then
            echo "::error::LICENSE file does not appear to be AGPL-3.0"
            exit 1
          fi
      - name: Verify package.json declares AGPL-3.0
        run: |
          if ! grep -q '"license": "AGPL-3.0' package.json; then
            echo "::error::package.json does not declare AGPL-3.0 license"
            exit 1
          fi
